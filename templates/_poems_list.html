{% if poems %}
    {% if list_title %}
        <h2>{{ list_title }}</h2>
    {% endif %}

    {% from "_macros.html" import poem_card %}
        <div class="cards-grid overflow-auto">
            {% for p in poems %}
                {{ poem_card(p) }}
            {% endfor %}
        </div>

    <!-- _pagination.html has its own total_pages >= 1 check, so you can safely just include it -->
    {% include "_pagination.html" %}

{% else %}
    <p>{{ empty_message|default('No poems found.') }}</p>
{% endif %}
