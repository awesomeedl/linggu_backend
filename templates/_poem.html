{% if poem %}
<div class="poem">
    <h2>{{ poem.title }}</h2>
    <h4><em>{{ poem.author }} &mdash; {{ poem.dynasty }}</em></h4>
    <div class="poem-text">
        {% for line in poem.text.split('。') %}
            {% if line.strip() %}
                <p class="poem-line">{{ line }}。</p>
            {% endif %}
        {% endfor %}
    </div>
</div>
{% else %}
<p class="poem">No poem available.</p>
{% endif %}
