<ul>
    {% for dynasty in dynasties %}
    <li>
    <details name="dynasty"
             hx-get="/dynasties/{{ dynasty.name | urlencode }}/authors?page=1"
             hx-target="#dynasty-authors-{{ loop.index }}"
             hx-trigger="toggle once">
        <summary>
            <strong>{{ dynasty.name }}</strong>
            <small class="muted-sm">({{ dynasty.author_count }} 作者)</small>
        </summary>
        
        <ul id="dynasty-authors-{{ loop.index }}" class="author-list overflow-auto">
            <!-- Authors lazy loaded here via HTMX -->
            <li><small>Loading authors...</small></li>
        </ul>
    </details>
    </li>
    {% endfor %}
</ul>
